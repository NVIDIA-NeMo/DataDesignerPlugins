repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # Use workspace ruff (via uv) so pre-commit and CI always agree on the version.
  # The single source of truth is the ruff version resolved in uv.lock.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: check-license-headers
        name: check-license-headers
        entry: uv run update-license-headers --check
        language: system
        types_or: [python, shell]
        pass_filenames: false

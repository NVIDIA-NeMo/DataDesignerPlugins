stages:
  - lint
  - test
  - validate
  - check
  - publish

default:
  tags:
    - pages
  image: ghcr.io/astral-sh/uv:python3.10-bookworm
  before_script:
    - make sync

variables:
  UV_SYSTEM_PYTHON: "1"

lint:
  stage: lint
  script:
    - make lint

test:
  stage: test
  before_script: []  # test uses isolated venvs, not workspace sync
  script:
    - make test

validate:
  stage: validate
  script:
    - make validate

check:
  stage: check
  script:
    - make check
  artifacts:
    paths:
      - docs/catalog.md.new
      - CODEOWNERS.new
    when: on_failure

publish:
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^data-designer-.*\/v.+$/'
  before_script: []
  variables:
    GIT_DEPTH: 0
  script:
    - PLUGIN_NAME="${CI_COMMIT_TAG%%/v*}"
    - TAG_VERSION="${CI_COMMIT_TAG#*/v}"
    - PLUGIN_DIR="plugins/${PLUGIN_NAME}"
    # Validate plugin dir exists
    - 'test -d "${PLUGIN_DIR}" || { echo "ERROR: ${PLUGIN_DIR} not found"; exit 1; }'
    # Validate tagged commit is on main
    - git fetch origin main
    - 'git merge-base --is-ancestor "${CI_COMMIT_SHA}" origin/main || { echo "ERROR: tagged commit is not on main"; exit 1; }'
    # Validate version match + metadata
    - uv run python tools/validate_release.py "${PLUGIN_NAME}" "${TAG_VERSION}"
    # CODEOWNERS check — tag pusher must be a listed owner
    - OWNERS=$(grep -v '^\s*#' "${PLUGIN_DIR}/CODEOWNERS" | grep -v '^\s*$' | awk '{for(i=2;i<=NF;i++) print $i}')
    - 'MATCH=0; for owner in $OWNERS; do [ "$owner" = "@${GITLAB_USER_LOGIN}" ] && MATCH=1; [ "$owner" = "${GITLAB_USER_EMAIL}" ] && MATCH=1; done; if [ "$MATCH" -eq 0 ]; then echo "ERROR: ${GITLAB_USER_LOGIN} is not listed in ${PLUGIN_DIR}/CODEOWNERS"; echo "Listed owners: $OWNERS"; exit 1; fi'
    # Isolated test
    - uv venv ".venv-${PLUGIN_NAME}"
    - . ".venv-${PLUGIN_NAME}/bin/activate"
    - uv pip install -e "${PLUGIN_DIR}"
    - uv pip install pytest
    - pytest "${PLUGIN_DIR}/tests/" -v
    - deactivate
    # Build + publish
    - uv build "${PLUGIN_DIR}" --out-dir dist/
    - uv publish dist/* --token "${PYPI_TOKEN}"

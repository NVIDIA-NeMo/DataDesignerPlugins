stages:
  - lint
  - test
  - validate
  - check

default:
  tags:
    - pages
  image: ghcr.io/astral-sh/uv:python3.10-bookworm
  before_script:
    - make sync

variables:
  UV_SYSTEM_PYTHON: "1"

lint:
  stage: lint
  script:
    - make lint

test:
  stage: test
  before_script: []  # test uses isolated venvs, not workspace sync
  script:
    - make test

validate:
  stage: validate
  script:
    - make validate

check:
  stage: check
  script:
    - make check
  artifacts:
    paths:
      - docs/catalog.md.new
      - CODEOWNERS.new
    when: on_failure

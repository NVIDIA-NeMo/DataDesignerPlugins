name: Publish

on:
  push:
    tags:
      - "data-designer-*/v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for merge-base check

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          PLUGIN_NAME="${TAG%%/v*}"
          TAG_VERSION="${TAG#*/v}"
          PLUGIN_DIR="plugins/${PLUGIN_NAME}"
          echo "plugin_name=${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "plugin_dir=${PLUGIN_DIR}" >> "$GITHUB_OUTPUT"

      - name: Validate plugin directory exists
        run: |
          test -d "${{ steps.tag.outputs.plugin_dir }}" \
            || { echo "ERROR: ${{ steps.tag.outputs.plugin_dir }} not found"; exit 1; }

      - name: Validate tagged commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main \
            || { echo "ERROR: tagged commit is not on main"; exit 1; }

      - name: Sync workspace
        run: make sync

      - name: Validate version match and metadata
        run: uv run ddp check-release "${{ steps.tag.outputs.plugin_name }}" "${{ steps.tag.outputs.tag_version }}"

      - name: Authorize tag pusher against CODEOWNERS
        env:
          ACTOR: ${{ github.actor }}
          PLUGIN_DIR: ${{ steps.tag.outputs.plugin_dir }}
          # Team lookups require a token with read:org scope. The default
          # GITHUB_TOKEN usually works for public teams; set MEMBERSHIP_TOKEN
          # as a PAT secret if team resolution fails.
          GH_TOKEN: ${{ secrets.MEMBERSHIP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ALL_OWNERS=$(uv run python -m ddp.release_owners --all "${PLUGIN_DIR}/CODEOWNERS")
          OWNERS=$(uv run python -m ddp.release_owners "${PLUGIN_DIR}/CODEOWNERS")
          MATCH=0
          for owner in $OWNERS; do
            case "$owner" in
              @*/*)
                ORG="${owner#@}"; ORG="${ORG%%/*}"
                TEAM_SLUG="${owner##*/}"
                if gh api "orgs/${ORG}/teams/${TEAM_SLUG}/memberships/${ACTOR}" >/dev/null 2>&1; then
                  MATCH=1; break
                fi
                ;;
              @*)
                if [ "$owner" = "@${ACTOR}" ]; then MATCH=1; break; fi
                ;;
            esac
          done
          if [ "$MATCH" -eq 0 ]; then
            echo "ERROR: @${ACTOR} is not an authorized owner of ${PLUGIN_DIR}/CODEOWNERS"
            echo "Listed owners: $ALL_OWNERS"
            exit 1
          fi

      - name: Run plugin tests in isolated venv
        env:
          PLUGIN_NAME: ${{ steps.tag.outputs.plugin_name }}
          PLUGIN_DIR: ${{ steps.tag.outputs.plugin_dir }}
        run: |
          uv venv ".venv-${PLUGIN_NAME}"
          . ".venv-${PLUGIN_NAME}/bin/activate"
          uv pip install -e "${PLUGIN_DIR}"
          uv pip install pytest
          pytest "${PLUGIN_DIR}/tests/" -v

      - name: Build distribution
        run: uv build "${{ steps.tag.outputs.plugin_dir }}" --out-dir dist/

      - name: Check distribution metadata
        run: uv run twine check dist/*

      - name: Ensure package asset release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_TAG="ddp-package-assets"
          if gh release view "${ASSET_TAG}" >/dev/null 2>&1; then
            gh release edit "${ASSET_TAG}" --latest=false
          else
            gh release create "${ASSET_TAG}" \
              --title "Data Designer plugin package assets" \
              --notes "Package files and package-list metadata for the static Data Designer plugin index." \
              --latest=false
          fi

      - name: Upload package files without clobbering changed bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_TAG="ddp-package-assets"
          mkdir -p release-assets-existing
          for package_file in dist/*; do
            asset_name="$(basename "${package_file}")"
            rm -rf release-assets-existing/*
            if gh release download "${ASSET_TAG}" --pattern "${asset_name}" --dir release-assets-existing >/dev/null 2>&1; then
              existing_hash="$(sha256sum "release-assets-existing/${asset_name}" | awk '{print $1}')"
              new_hash="$(sha256sum "${package_file}" | awk '{print $1}')"
              if [ "${existing_hash}" != "${new_hash}" ]; then
                echo "ERROR: ${asset_name} already exists with a different SHA256"
                exit 1
              fi
              echo "${asset_name} already exists with matching SHA256"
            else
              gh release upload "${ASSET_TAG}" "${package_file}"
            fi
          done

      - name: Update package-list metadata asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_TAG="ddp-package-assets"
          mkdir -p release-metadata
          gh release download "${ASSET_TAG}" --pattern packages.json --dir release-metadata \
            || : > release-metadata/packages.json
          uv run ddp package-index merge \
            --package-list release-metadata/packages.json \
            --dist-dir dist \
            --output release-metadata/packages.json
          gh release delete-asset "${ASSET_TAG}" packages.json -y || true
          gh release upload "${ASSET_TAG}" release-metadata/packages.json

      - uses: actions/configure-pages@v5

      - name: Build documentation and static package index
        run: make docs PACKAGE_LIST=release-metadata/packages.json

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment

name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "Makefile"
      - "devtools/ddp/src/ddp/plugin_docs.py"
      - "devtools/ddp/src/ddp/package_index.py"
      - "catalog/plugins.json"
      - "docs/**"
      - "plugins/**/docs/**"
      - "pyproject.toml"
      - "uv.lock"
      - "zensical.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"
          enable-cache: true

      - run: make sync

      - name: Prepare package list
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .cache/package-index
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            gh release download ddp-package-assets --pattern packages.json --dir .cache/package-index \
              || : > .cache/package-index/packages.json
          else
            : > .cache/package-index/packages.json
          fi

      - run: make docs PACKAGE_LIST=.cache/package-index/packages.json

      - uses: actions/upload-pages-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: site

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: docs-site
          path: site
          if-no-files-found: error

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"
          enable-cache: true
      - run: make sync
      - run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"
          enable-cache: true
      # test uses isolated venvs, not workspace sync
      - run: make test

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"
          enable-cache: true
      - run: make sync
      - run: make validate

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"
          enable-cache: true
      - run: make sync
      - run: make check
      - name: Upload drift artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-metadata
          path: |
            docs/plugins/**
            zensical.toml
            catalog/plugins.json.new
            .github/CODEOWNERS.new
          if-no-files-found: ignore

services:
  piston:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data-designer-piston
    privileged: true
    ports:
      - "${PISTON_PORT:-2000}:2000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:2000/api/v2/runtimes\", timeout=1)'"
      interval: 10s
      timeout: 2s
      retries: 12
